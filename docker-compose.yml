services:
  postgres:
    image: postgres:15-alpine
    container_name: medismart_postgres
    environment:
      POSTGRES_USER: medismart
      POSTGRES_PASSWORD: medismart123
      POSTGRES_DB: medismart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medismart -d medismart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medismart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ddi-mvp:
    build: ./ddi_mvp
    container_name: medismart_ddi_mvp
    ports:
      - "9000:8000"
    environment:
      - MODEL_DIR=models/
      - DDI_THRESHOLD=0.40
      - LOG_LEVEL=INFO
    volumes:
      - ./ddi_mvp/models:/app/models:ro
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build: ./backend
    container_name: medismart_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://medismart:medismart123@postgres:5432/medismart_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-this-to-a-very-long-random-string-in-production-minimum-32-chars
      - ALGORITHM=HS256
      - ML_SERVICE_URL=http://ddi-mvp:8000
      - ML_SERVICE_TIMEOUT=30.0
      - ML_CACHE_PREDICTIONS=true
      - FRONTEND_URL=http://localhost:5173
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/v1/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ddi-mvp:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: medismart_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
