</div>

</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant font-semibold">Mật khẩu</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container font-medium transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">lock</span>
<input class="w-full bg-white/50 border border-white/60 rounded-xl pl-11 pr-4 py-3.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary/50 focus:ring-2 focus:ring-primary/20 placeholder-outline/60 transition-all duration-300 backdrop-blur-md" placeholder="••••••••" type="password"/>
</div>
</div>

<div class="flex-1 border-t border-outline-variant/40 h-px"></div>
<span class="font-label-md text-[11px] text-outline uppercase tracking-wider font-semibold">hoặc</span>
