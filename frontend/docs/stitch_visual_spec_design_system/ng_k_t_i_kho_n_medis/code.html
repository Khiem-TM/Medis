<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký - Medis Ether</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-tint": "#006b5f",
                      "glass-surface": "rgba(255, 255, 255, 0.7)",
                      "error-red": "#B00020",
                      "tertiary-fixed-dim": "#ebb2ff",
                      "outline-variant": "#bcc9c5",
                      "active-green": "#43A047",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#bbc3ff",
                      "on-primary-fixed": "#00201c",
                      "inverse-primary": "#70d8c8",
                      "tertiary-container": "#a54dcc",
                      "on-tertiary-fixed": "#320047",
                      "surface-container-highest": "#e2e2e2",
                      "secondary": "#4555b7",
                      "error-container": "#ffdad6",
                      "tertiary-fixed": "#f8d8ff",
                      "on-tertiary-container": "#fffbff",
                      "surface-dim": "#dadada",
                      "inverse-on-surface": "#f0f1f1",
                      "primary-fixed-dim": "#70d8c8",
                      "primary-fixed": "#8df5e4",
                      "background": "#f9f9f9",
                      "primary-container": "#008376",
                      "on-surface": "#1a1c1c",
                      "on-secondary-fixed-variant": "#2c3c9e",
                      "on-secondary-fixed": "#000e5e",
                      "on-primary-fixed-variant": "#005048",
                      "secondary-fixed": "#dee0ff",
                      "error": "#ba1a1a",
                      "surface-bright": "#f9f9f9",
                      "on-background": "#1a1c1c",
                      "warning-orange": "#E65100",
                      "surface-container-lowest": "#ffffff",
                      "surface-container": "#eeeeee",
                      "outline": "#6d7a77",
                      "on-primary-container": "#f4fffb",
                      "glass-border": "rgba(255, 255, 255, 0.4)",
                      "surface-container-low": "#f3f3f3",
                      "on-secondary": "#ffffff",
                      "on-tertiary-fixed-variant": "#721199",
                      "on-surface-variant": "#3d4946",
                      "inverse-surface": "#2f3131",
                      "on-secondary-container": "#182a8e",
                      "primary": "#00685d",
                      "on-error": "#ffffff",
                      "completed-gray": "#9E9E9E",
                      "surface-container-high": "#e8e8e8",
                      "surface-variant": "#e2e2e2",
                      "on-primary": "#ffffff",
                      "surface": "#f9f9f9",
                      "secondary-container": "#8999ff",
                      "on-tertiary": "#ffffff",
                      "tertiary": "#8a30b0"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "2xl": "1rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-lg": "32px",
                      "stack-sm": "8px",
                      "container-padding": "24px",
                      "stack-md": "16px",
                      "gutter": "24px",
                      "unit": "4px",
                      "margin-page": "40px"
              },
              "fontFamily": {
                      "body-md": ["Inter", "sans-serif"],
                      "headline-lg": ["Inter", "sans-serif"],
                      "headline-sm": ["Inter", "sans-serif"],
                      "headline-lg-mobile": ["Inter", "sans-serif"],
                      "caption": ["Inter", "sans-serif"],
                      "headline-md": ["Inter", "sans-serif"],
                      "label-md": ["Inter", "sans-serif"],
                      "body-lg": ["Inter", "sans-serif"],
                      "display-hero": ["Inter", "sans-serif"],
                      "body-sm": ["Inter", "sans-serif"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                      "caption": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "display-hero": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        .mesh-bg {
            background-color: #f9f9f9;
            background-image: 
                radial-gradient(at 10% 20%, rgba(112, 216, 200, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(235, 178, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(187, 195, 255, 0.3) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-container-padding text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Transactional Screen: Navigation Shell Suppressed -->
<main class="w-full max-w-xl relative z-10">
<!-- Glassmorphism Card Container -->
<div class="bg-glass-surface/80 backdrop-blur-2xl border border-glass-border rounded-2xl shadow-[0_16px_32px_-12px_rgba(0,0,0,0.05)] p-stack-lg sm:p-margin-page">
<!-- Header -->
<div class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 mb-stack-md text-primary">
<span class="material-symbols-outlined text-[32px]">health_and_safety</span>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-sm">Tạo tài khoản mới</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Tham gia Medis để trải nghiệm quản lý sức khỏe tinh tế và rõ ràng.</p>
</div>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="fullName">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="fullName" name="fullName" placeholder="Nhập họ và tên của bạn" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-stack-md">
<!-- Email -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="email" name="email" placeholder="Địa chỉ email" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="phone">Số điện thoại</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">call</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="phone" name="phone" placeholder="Số điện thoại" type="tel"/>
</div>
</div>
</div>
<!-- Username -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">account_circle</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="username" name="username" placeholder="Chọn tên đăng nhập" type="text"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="password" name="password" placeholder="Tạo mật khẩu an toàn" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-unit mb-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="confirmPassword">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">lock_reset</span>
<input class="w-full bg-surface-container-lowest/50 backdrop-blur-sm border border-glass-border rounded-lg pl-10 pr-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" type="password"/>
</div>
</div>
<!-- Submit Button -->
<!-- Note: Request asked for teal-to-indigo gradient. Mapping to theme primary (teal) to secondary (indigo-ish). -->
<button class="w-full bg-gradient-to-r from-primary to-secondary text-on-primary font-headline-sm text-headline-sm py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-sm mt-stack-sm" type="submit">
                    Tạo tài khoản
                </button>
</form>
<!-- Footer Links -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold hover:text-primary-container transition-colors ml-1" href="#">Đăng nhập</a>
</p>
<p class="font-caption text-caption text-outline mt-stack-sm">
                    Bằng việc đăng ký, bạn đồng ý với <a class="underline hover:text-primary transition-colors" href="#">Điều khoản dịch vụ</a> và <a class="underline hover:text-primary transition-colors" href="#">Chính sách bảo mật</a> của chúng tôi.
                </p>
</div>
</div>
</main>
</body></html>
